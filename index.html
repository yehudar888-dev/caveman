<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaveMan</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="CaveMan">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; overflow-x: hidden; }
#cave {
  background: #000;
  width: 100%;
  min-height: 200vh;
  position: relative;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
#header {
  position: fixed;
  top: 28px;
  left: 0; right: 0;
  text-align: center;
  z-index: 5;
  pointer-events: none;
}
#tabs { pointer-events: all; }
#header h1 {
  color: rgba(255,255,255,0.3);
  font-size: 12px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  font-weight: 400;
}
#header p {
  color: rgba(255,255,255,0.85);
  font-size: 32px;
  font-weight: 600;
  margin-top: 10px;
  letter-spacing: -0.02em;
}
.bubble {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  text-align: center;
  animation: float linear infinite;
  transition: border-color 0.2s, background 0.2s;
}
.bubble:hover {
  border-color: rgba(255,255,255,0.55);
  background: rgba(255,255,255,0.12);
}
.bubble span {
  color: rgba(255,255,255,0.8);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.03em;
  pointer-events: none;
  padding: 8px;
}
@keyframes float {
  0%   { transform: translateY(0px); }
  50%  { transform: translateY(-13px); }
  100% { transform: translateY(0px); }
}
#scroll-hint {
  position: fixed;
  bottom: 28px;
  left: 0; right: 0;
  text-align: center;
  color: rgba(255,255,255,0.22);
  font-size: 11px;
  letter-spacing: 0.18em;
  pointer-events: none;
  transition: opacity 0.6s ease;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 20;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 28px;
  overflow-y: auto;
}
#overlay.on { display: flex; }
#back {
  position: absolute;
  top: 18px; left: 18px;
  background: none; border: none;
  color: rgba(255,255,255,0.3);
  font-size: 13px; letter-spacing: 0.08em;
  cursor: pointer; font-family: inherit;
}
#back:hover { color: rgba(255,255,255,0.75); }
#dots { display: flex; gap: 7px; margin-bottom: 28px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.15); }
.dot.on { background: rgba(255,255,255,0.7); }
#otag { color: rgba(255,255,255,0.28); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 10px; }
#otitle { color: #fff; font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 12px; line-height: 1.3; }
#obody { color: rgba(255,255,255,0.5); font-size: 14px; line-height: 1.75; text-align: center; max-width: 360px; margin-bottom: 32px; }
#choices { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 380px; }
.cbtn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: 100px;
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  font-family: inherit;
  padding: 13px 22px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  text-align: left;
}
.cbtn:hover { background: rgba(255,255,255,0.11); border-color: rgba(255,255,255,0.4); }
#final {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 20;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 28px;
  text-align: center;
}
#final.on { display: flex; }
#ftitle { color: #fff; font-size: 22px; font-weight: 600; margin-bottom: 12px; }
#fbody { color: rgba(255,255,255,0.5); font-size: 14px; line-height: 1.75; max-width: 360px; margin-bottom: 28px; }
#ftip {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 18px 24px;
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  line-height: 1.7;
  max-width: 360px;
  margin-bottom: 32px;
  text-align: left;
}
#rbtn {
  background: none;
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 100px;
  color: rgba(255,255,255,0.35);
  font-size: 12px; letter-spacing: 0.1em;
  font-family: inherit;
  padding: 9px 26px;
  cursor: pointer;
}
#rbtn:hover { border-color: rgba(255,255,255,0.45); color: rgba(255,255,255,0.75); }
/* Tabs */
#tabs { display: flex; justify-content: center; gap: 24px; margin-top: 14px; }
.tab-btn { background: none; border: none; border-bottom: 1px solid transparent; color: rgba(255,255,255,0.2); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer; font-family: inherit; padding: 2px 0 5px; transition: color 0.2s, border-color 0.2s; }
.tab-btn.active { color: rgba(255,255,255,0.7); border-bottom-color: rgba(255,255,255,0.35); }
.tab-btn:hover:not(.active) { color: rgba(255,255,255,0.45); }
/* Timer cave */
#timer-cave { background: #000; width: 100%; min-height: 200vh; position: relative; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: none; }
/* Timer overlay */
#timer-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 25; flex-direction: column; align-items: center; justify-content: center; }
#timer-overlay.on { display: flex; }
#timer-back { position: absolute; top: 18px; left: 18px; background: none; border: none; color: rgba(255,255,255,0.3); font-size: 13px; letter-spacing: 0.08em; cursor: pointer; font-family: inherit; }
#timer-back:hover { color: rgba(255,255,255,0.75); }
#timer-tag { color: rgba(255,255,255,0.18); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 32px; font-family: inherit; }
#timer-display { color: rgba(255,255,255,0.88); font-size: 78px; font-weight: 200; letter-spacing: 0.04em; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin-bottom: 16px; line-height: 1; }
#timer-status { color: rgba(255,255,255,0.22); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; font-family: inherit; margin-bottom: 44px; }
#timer-again { background: none; border: 1px solid rgba(255,255,255,0.15); border-radius: 100px; color: rgba(255,255,255,0.3); font-size: 12px; letter-spacing: 0.1em; font-family: inherit; padding: 9px 26px; cursor: pointer; display: none; }
#timer-again:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.7); }
/* Bro cave */
#bro-cave {
  display: none;
  position: fixed;
  left: 0; right: 0; bottom: 0; top: 108px;
  background: #000;
  z-index: 2;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 36px 40px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
#bro-cave.on { display: flex; }
#bro-label { color: rgba(255,255,255,0.15); font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; margin-bottom: 28px; }
#bro-quote { color: rgba(255,255,255,0.88); font-size: 20px; font-weight: 300; line-height: 1.8; text-align: center; max-width: 340px; }
</style>
</head>
<body>

<div id="header">
  <h1>caveman</h1>
  <p id="header-sub">what's going on?</p>
  <div id="tabs">
    <button class="tab-btn active" onclick="switchTab('feel')">feel</button>
    <button class="tab-btn" onclick="switchTab('bro')">bro</button>
    <button class="tab-btn" onclick="switchTab('reset')">reset</button>
  </div>
</div>
<div id="cave"></div>
<div id="timer-cave"></div>
<div id="bro-cave">
  <div id="bro-label">from your older bro</div>
  <p id="bro-quote"></p>
</div>
<div id="scroll-hint">scroll for more ↓</div>

<div id="overlay">
  <button id="back" onclick="goBack()">← back</button>
  <div id="dots"></div>
  <div id="otag"></div>
  <div id="otitle"></div>
  <div id="obody"></div>
  <div id="choices"></div>
</div>

<div id="final">
  <div id="ftitle"></div>
  <div id="fbody"></div>
  <div id="ftip"></div>
  <button id="rbtn" onclick="restart()">start over</button>
</div>

<div id="timer-overlay">
  <button id="timer-back" onclick="cancelTimer()">← stop</button>
  <div id="timer-tag">dopamine detox</div>
  <div id="timer-display">00:00</div>
  <div id="timer-status">resetting...</div>
  <button id="timer-again" onclick="startLastTimer()">do it again</button>
</div>

<script src="quotes.js"></script>
<script src="flows.js"></script>
<script src="finals_v2.js"></script>
<script>
const feelings = [
  { label: "anger",        size: 108 },
  { label: "anxiety",      size: 98 },
  { label: "sadness",      size: 103 },
  { label: "loneliness",   size: 95 },
  { label: "overthinking", size: 116 },
  { label: "emptiness",    size: 90 },
  { label: "stress",       size: 100 },
  { label: "numbness",     size: 87 },
  { label: "shame",        size: 93 },
  { label: "grief",        size: 105 },
  { label: "burnout",      size: 110 },
  { label: "fear",         size: 96 },
  { label: "guilt",        size: 88 },
  { label: "frustration",  size: 100 },
  { label: "hopelessness", size: 97 },
  { label: "heartbreak",   size: 103 },
  { label: "exhaustion",   size: 108 },
  { label: "rejection",    size: 93 },
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

let curFeeling = null, stepIdx = 0, path = [];

function buildBubbles() {
  const cave = document.getElementById('cave');
  const W = window.innerWidth;
  const H = window.innerHeight;
  const caveH = Math.max(H * 1.5, feelings.length * 88 + 100);
  cave.style.minHeight = caveH + 'px';
  const placed = [];

  feelings.forEach(f => {
    const s = f.size;
    let x = 0, y = 0, ok = false;
    for (let t = 0; t < 800; t++) {
      x = Math.random() * (W - s - 14) + 7;
      y = Math.random() * (caveH - s - 100) + 100;
      ok = placed.every(p => {
        const dx = x + s/2 - p.cx, dy = y + s/2 - p.cy;
        return Math.sqrt(dx*dx + dy*dy) > (s/2 + p.r + 9);
      });
      if (ok) break;
    }
    placed.push({ cx: x+s/2, cy: y+s/2, r: s/2 });

    const d = document.createElement('div');
    d.className = 'bubble';
    d.style.cssText = `width:${s}px;height:${s}px;left:${x}px;top:${y}px;animation-duration:${(3.5+Math.random()*4).toFixed(1)}s;animation-delay:-${(Math.random()*5).toFixed(1)}s`;
    d.innerHTML = `<span>${f.label}</span>`;
    d.onclick = () => begin(f.label);
    cave.appendChild(d);
  });

  const hint = document.getElementById('scroll-hint');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 60) hint.style.opacity = '0';
    else hint.style.opacity = '1';
  }, { passive: true });
}

function begin(feeling) {
  curFeeling = feeling; stepIdx = 0; path = [];
  document.getElementById('cave').style.display = 'none';
  document.getElementById('final').classList.remove('on');
  showStep();
}

function showStep() {
  const flow = flows[curFeeling];
  if (!flow || !flow.root) { restart(); return; }
  let node;
  if      (stepIdx === 0) node = flow.root;
  else if (stepIdx === 1) node = flow.l1[path[0]];
  else if (stepIdx === 2) node = flow.l2[path[0]][path[1]];
  else if (stepIdx === 3) node = flow.l3[path[0]];
  else {
    const v2 = (typeof finalsV2 !== 'undefined') && finalsV2[curFeeling]?.[path[0]]?.[path[1] % 3];
    showFinal(v2 || flow.finals[path[0]]);
    return;
  }

  document.getElementById('otag').textContent = curFeeling;
  document.getElementById('otitle').textContent = pick(node.titles);
  document.getElementById('obody').textContent = pick(node.bodies);

  const ch = document.getElementById('choices');
  ch.innerHTML = '';
  const choiceSet = pick(node.choiceSets);
  choiceSet.forEach((c, i) => {
    const b = document.createElement('button');
    b.className = 'cbtn';
    b.textContent = c;
    b.onclick = () => { path.push(i); stepIdx++; showStep(); };
    ch.appendChild(b);
  });

  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i <= stepIdx ? ' on' : '');
    dots.appendChild(d);
  }
  document.getElementById('overlay').classList.add('on');
}

function showFinal(node) {
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('ftitle').textContent = pick(node.titles);
  document.getElementById('fbody').textContent = pick(node.bodies);
  document.getElementById('ftip').textContent = '→  ' + pick(node.tips);
  document.getElementById('final').classList.add('on');
}

function goBack() {
  if (stepIdx === 0) { restart(); return; }
  path.pop(); stepIdx--;
  showStep();
}

function restart() {
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('final').classList.remove('on');
  document.getElementById('cave').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Timer tab ──────────────────────────────────────────────
const timerOptions = [
  { label: '2 min',  secs: 120,  size: 80 },
  { label: '5 min',  secs: 300,  size: 92 },
  { label: '10 min', secs: 600,  size: 104 },
  { label: '15 min', secs: 900,  size: 112 },
  { label: '20 min', secs: 1200, size: 108 },
  { label: '30 min', secs: 1800, size: 118 },
  { label: '45 min', secs: 2700, size: 106 },
  { label: '1 hr',   secs: 3600, size: 98 },
  { label: '2 hr',   secs: 7200, size: 88 },
];

function buildTimerBubbles() {
  const cave = document.getElementById('timer-cave');
  const W = window.innerWidth;
  const H = window.innerHeight;
  const caveH = Math.max(H * 1.2, timerOptions.length * 88 + 100);
  cave.style.minHeight = caveH + 'px';
  const placed = [];
  timerOptions.forEach(t => {
    const s = t.size;
    let x = 0, y = 0, ok = false;
    for (let tr = 0; tr < 800; tr++) {
      x = Math.random() * (W - s - 14) + 7;
      y = Math.random() * (caveH - s - 100) + 100;
      ok = placed.every(p => {
        const dx = x + s/2 - p.cx, dy = y + s/2 - p.cy;
        return Math.sqrt(dx*dx+dy*dy) > (s/2 + p.r + 9);
      });
      if (ok) break;
    }
    placed.push({ cx: x+s/2, cy: y+s/2, r: s/2 });
    const d = document.createElement('div');
    d.className = 'bubble';
    d.style.cssText = `width:${s}px;height:${s}px;left:${x}px;top:${y}px;animation-duration:${(3.5+Math.random()*4).toFixed(1)}s;animation-delay:-${(Math.random()*5).toFixed(1)}s`;
    d.innerHTML = `<span>${t.label}</span>`;
    d.onclick = () => startTimer(t.secs);
    cave.appendChild(d);
  });
}

let timerInterval = null, timerSecondsLeft = 0, lastTimerSecs = 0;

function startTimer(secs) {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  timerSecondsLeft = secs;
  lastTimerSecs = secs;
  document.getElementById('timer-cave').style.display = 'none';
  document.getElementById('timer-again').style.display = 'none';
  document.getElementById('timer-back').textContent = '← stop';
  document.getElementById('timer-status').textContent = 'resetting...';
  document.getElementById('timer-display').textContent = formatTime(secs);
  document.getElementById('timer-overlay').classList.add('on');
  timerInterval = setInterval(() => {
    timerSecondsLeft--;
    if (timerSecondsLeft <= 0) {
      clearInterval(timerInterval); timerInterval = null;
      timerDone();
    } else {
      document.getElementById('timer-display').textContent = formatTime(timerSecondsLeft);
    }
  }, 1000);
}

function formatTime(secs) {
  const m = Math.floor(secs / 60), s = secs % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function timerDone() {
  document.getElementById('timer-display').textContent = 'done.';
  document.getElementById('timer-status').textContent = 'you made it.';
  document.getElementById('timer-back').textContent = '← back';
  document.getElementById('timer-again').style.display = 'block';
  if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
}

function cancelTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('timer-overlay').classList.remove('on');
  document.getElementById('timer-cave').style.display = 'block';
}

function startLastTimer() { startTimer(lastTimerSecs); }

function showQuote() {
  document.getElementById('bro-quote').textContent = pick(quotes);
}

// ── Tab switching ──────────────────────────────────────────
function switchTab(tab) {
  const cave  = document.getElementById('cave');
  const tcave = document.getElementById('timer-cave');
  const bcave = document.getElementById('bro-cave');
  const sub   = document.getElementById('header-sub');
  const hint  = document.getElementById('scroll-hint');
  const order = ['feel', 'bro', 'reset'];
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', order[i] === tab);
  });
  cave.style.display  = tab === 'feel'  ? 'block' : 'none';
  tcave.style.display = tab === 'reset' ? 'block' : 'none';
  hint.style.display  = tab === 'feel'  ? ''      : 'none';
  bcave.classList.toggle('on', tab === 'bro');
  const subs = { feel: "what's going on?", bro: 'real talk.', reset: 'clear your head.' };
  sub.textContent = subs[tab];
  if (tab === 'bro') showQuote();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildBubbles();
buildTimerBubbles();
</script>
</body>
</html>
