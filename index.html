<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaveMan</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; }
#cave {
  background: #000;
  width: 100%;
  height: 100vh;
  position: relative;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
#header {
  position: absolute;
  top: 24px;
  left: 0; right: 0;
  text-align: center;
  z-index: 5;
  pointer-events: none;
}
#header h1 {
  color: rgba(255,255,255,0.3);
  font-size: 12px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  font-weight: 400;
}
#header p {
  color: rgba(255,255,255,0.85);
  font-size: 32px;
  font-weight: 600;
  margin-top: 10px;
  letter-spacing: -0.02em;
}
.bubble {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  text-align: center;
  animation: float linear infinite;
  transition: border-color 0.2s, background 0.2s;
}
.bubble:hover {
  border-color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.12);
}
.bubble span {
  color: rgba(255,255,255,0.8);
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.03em;
  pointer-events: none;
}
@keyframes float {
  0%   { transform: translateY(0px); }
  50%  { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 20;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 28px;
}
#overlay.on { display: flex; }
#back {
  position: absolute;
  top: 18px; left: 18px;
  background: none; border: none;
  color: rgba(255,255,255,0.35);
  font-size: 13px; letter-spacing: 0.08em;
  cursor: pointer; font-family: inherit;
}
#back:hover { color: rgba(255,255,255,0.8); }
#dots { display: flex; gap: 7px; margin-bottom: 24px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.18); }
.dot.on { background: rgba(255,255,255,0.75); }
#otag { color: rgba(255,255,255,0.3); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px; }
#otitle { color: #fff; font-size: 22px; font-weight: 500; text-align: center; margin-bottom: 10px; }
#obody { color: rgba(255,255,255,0.55); font-size: 14px; line-height: 1.7; text-align: center; max-width: 380px; margin-bottom: 28px; }
#choices { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 380px; }
.cbtn {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 100px;
  color: #fff;
  font-size: 13px;
  font-family: inherit;
  padding: 13px 22px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.cbtn:hover { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.45); }
#final {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 20;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 28px;
  text-align: center;
}
#final.on { display: flex; }
#ftitle { color: #fff; font-size: 22px; font-weight: 500; margin-bottom: 10px; }
#fbody { color: rgba(255,255,255,0.55); font-size: 14px; line-height: 1.7; max-width: 360px; margin-bottom: 24px; }
#ftip {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 16px 22px;
  color: rgba(255,255,255,0.65);
  font-size: 13px;
  line-height: 1.65;
  max-width: 360px;
  margin-bottom: 28px;
}
#rbtn {
  background: none;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 100px;
  color: rgba(255,255,255,0.4);
  font-size: 12px; letter-spacing: 0.1em;
  font-family: inherit;
  padding: 9px 26px;
  cursor: pointer;
}
#rbtn:hover { border-color: rgba(255,255,255,0.5); color: rgba(255,255,255,0.8); }
</style>
</head>
<body>

<div id="cave">
  <div id="header">
    <h1>caveman</h1>
    <p>what's going on?</p>
  </div>
</div>

<div id="overlay">
  <button id="back" onclick="goBack()">← back</button>
  <div id="dots"></div>
  <div id="otag"></div>
  <div id="otitle"></div>
  <div id="obody"></div>
  <div id="choices"></div>
</div>

<div id="final">
  <div id="ftitle"></div>
  <div id="fbody"></div>
  <div id="ftip"></div>
  <button id="rbtn" onclick="restart()">start over</button>
</div>

<script>
const feelings = [
  { label: "anger",        size: 92 },
  { label: "anxiety",      size: 84 },
  { label: "sadness",      size: 88 },
  { label: "loneliness",   size: 80 },
  { label: "overthinking", size: 100 },
  { label: "emptiness",    size: 76 },
  { label: "stress",       size: 86 },
  { label: "numbness",     size: 72 },
  { label: "shame",        size: 78 },
];

const flows = {
  anger: {
    steps: [
      { title: "yo, what actually happened?", body: "anger doesn't just show up. something got to you. let's find it.", choices: ["someone let me down","i feel disrespected","things just aren't going my way","honestly no idea"] },
      { "someone let me down": { title: "that stings bro", body: "when someone you counted on drops the ball, it cuts deep. especially when you'd never do that to them.", choices: ["i expected way more from them","it keeps happening","i feel dumb for trusting them"] }, "i feel disrespected": { title: "nah that's valid", body: "feeling dismissed is real. your anger is just your brain going 'nah bro, i matter'.", choices: ["they acted like i don't exist","nobody actually listens to me","i keep getting talked over"] }, "things just aren't going my way": { title: "everything's fighting you", body: "some days life just resists. every little thing goes wrong and it all stacks up fast.", choices: ["i'm tired of fighting for it","i keep trying and nothing works","it's just one thing after another"] }, "honestly no idea": { title: "that's actually super common", body: "sometimes the anger's just sitting there with no clear target. that's usually stress that's been building up with nowhere to go.", choices: ["i've been stressed for a while","i feel like i'm about to snap","everything's been annoying me lately"] } },
      { final: true, title: "got it.", body: "your anger makes sense bro. it's just telling you something matters to you — your trust, your respect, your limits.", tip: "say it out loud: 'i'm angry because ___'. just naming it takes like half the heat away. seriously try it." }
    ]
  },
  anxiety: {
    steps: [
      { title: "where's your head at rn?", body: "anxiety's everywhere at once. let's zoom in a bit.", choices: ["worried about the future","social stuff","something specific coming up","just a constant low-key dread"] },
      { "worried about the future": { title: "the what-ifs won't shut up", body: "your brain's running worst-case scenarios on loop. it thinks it's helping. it's really not.", choices: ["i can't stop imagining things going wrong","i feel like nothing's in my control","i'm scared of failing"] }, "social stuff": { title: "the people stuff is exhausting", body: "social anxiety is lowkey brutal. always in your head about how you're coming across to everyone.", choices: ["i overthink everything i say","i hate being judged","i avoid stuff just to not feel it"] }, "something specific coming up": { title: "that one thing looming", body: "when there's something concrete coming up, anxiety locks in on it. makes it feel way bigger than it is.", choices: ["i can't stop thinking about it","i keep putting off dealing with it","my body's already reacting"] }, "just a constant low-key dread": { title: "background anxiety is real", body: "that low hum that never fully goes away. no obvious reason, just always there.", choices: ["it's been like this for months","i wake up already tense","i forget what actually chill feels like"] } },
      { final: true, title: "anxiety noted bro.", body: "you're not broken. your nervous system's just running hot right now. the world's probably asking a lot of you.", tip: "try 4-7-8 breathing: in for 4, hold for 7, out for 8. do it three times. it literally slows your heart rate down." }
    ]
  },
  sadness: {
    steps: [
      { title: "what's weighing on you?", body: "sadness comes in different shapes. let's figure out yours.", choices: ["i lost something or someone","i feel like i'm falling behind","i don't feel connected to anyone","i just feel... low"] },
      { "i lost something or someone": { title: "grief is heavy bro", body: "loss hits different for everyone. doesn't matter if others think it's a big deal — it is to you.", choices: ["someone i care about is gone","i lost the life i thought i'd have","a relationship ended"] }, "i feel like i'm falling behind": { title: "comparison is brutal", body: "looking around and feeling like everyone else has it figured out while you're still figuring it out. rough.", choices: ["my friends seem way further ahead","i'm not where i thought i'd be","i feel like i wasted time"] }, "i don't feel connected to anyone": { title: "lonely in a crowd", body: "you can have people around and still feel completely alone. that disconnect is real.", choices: ["i have people but feel distant from them","i don't have anyone close","i push people away"] }, "i just feel... low": { title: "the heaviness", body: "sometimes sadness doesn't even need a reason. it just lands on you. that's valid too.", choices: ["it's been going on a while","i have zero motivation","i just feel flat"] } },
      { final: true, title: "felt it, named it.", body: "sadness just means you care about stuff bro. honestly that's not a bad thing to have.", tip: "let yourself feel it for 10 minutes. then do one small physical thing — go outside, cold water on your face, make some food." }
    ]
  },
  loneliness: {
    steps: [
      { title: "what kind of alone?", body: "loneliness shows up in a bunch of different ways.", choices: ["i literally have no one to talk to","people are around but nobody gets me","i want connection but i pull away","i lost my people somewhere along the way"] },
      { "i literally have no one to talk to": { title: "real isolation bro", body: "not having your person — someone to just check in with — is genuinely hard. that's a real human need.", choices: ["it's been like this for a while","i used to have people","things changed and i lost them"] }, "people are around but nobody gets me": { title: "invisible in the room", body: "surrounded but unseen. this kind of lonely honestly hits harder than being physically alone.", choices: ["i can't be myself around them","they never really ask about me","i'm always kind of performing"] }, "i want connection but i pull away": { title: "the push-pull", body: "wanting closeness but running from it. usually means something taught you it's safer to stay alone.", choices: ["i don't trust people easily","i push things away when they get close","being vulnerable freaks me out"] }, "i lost my people somewhere along the way": { title: "the drift", body: "friendships that just... faded. people who used to be everything and then weren't anymore.", choices: ["after school or a job changed","after a breakup or falling out","we all just got busy"] } },
      { final: true, title: "loneliness named.", body: "most people feel this and never say it out loud. you just did bro.", tip: "reach out to one person this week. doesn't have to be deep — a meme, a 'hey', a check-in. small moves chip away at it." }
    ]
  },
  overthinking: {
    steps: [
      { title: "what's the loop about?", body: "brain on repeat — what's it stuck on?", choices: ["a decision i can't make","something i said or did","what someone thinks of me","everything, all at once"] },
      { "a decision i can't make": { title: "stuck at the fork", body: "too many variables, scared of picking wrong. so you pick nothing and the loop just keeps going.", choices: ["both options seem bad","i'm scared of picking wrong","it affects too many people"] }, "something i said or did": { title: "the replay machine", body: "that one thing you said three days ago. three years ago. your brain will not let it go.", choices: ["i think i hurt someone","i embarrassed myself","i should've handled it differently"] }, "what someone thinks of me": { title: "living in their head rent-free", body: "spending more time in someone else's imagined thoughts than in your actual own life.", choices: ["after an awkward interaction","i care way too much what they think","i'm just waiting for them to pull away"] }, "everything, all at once": { title: "40 tabs open", body: "not one thing — literally everything. your brain switched to chaos mode and won't come back.", choices: ["i can't focus on anything","it's been like this for days","i feel overwhelmed just existing"] } },
      { final: true, title: "mind noted.", body: "overthinking is just anxiety hunting for certainty in an uncertain world. you genuinely can't think your way out of it bro.", tip: "set a 5 minute timer. write every looping thought down. once it's on paper your brain stops trying to hold it. then close the notebook." }
    ]
  },
  emptiness: {
    steps: [
      { title: "what does it feel like?", body: "emptiness is one of the harder ones to put words to. let's try.", choices: ["nothing excites me anymore","i'm just going through the motions","i don't know who i am rn","i just feel hollow"] },
      { "nothing excites me anymore": { title: "the flatline", body: "stuff that used to hit just... doesn't. music, food, people. all kind of grey.", choices: ["it came on gradually","it happened after something","i've kind of always felt this way"] }, "i'm just going through the motions": { title: "autopilot mode", body: "showing up, doing the things, but not really being there for any of it.", choices: ["everything feels pointless","my relationships feel surface-level","i can't remember the last time i felt present"] }, "i don't know who i am rn": { title: "identity drift", body: "a version of you that felt solid now feels unfamiliar. happens after big changes or long periods of stress.", choices: ["a lot in my life shifted","i've been so focused on others i lost myself","i don't even know what i actually want"] }, "i just feel hollow": { title: "the ache of nothing", body: "not sadness exactly. not anger. just... nothing. like a room with no furniture in it.", choices: ["it's been going on a while","i feel disconnected from my own body","nothing really feels like it matters"] } },
      { final: true, title: "emptiness acknowledged.", body: "emptiness usually means your system's just running low bro. not broken — depleted. there's a difference.", tip: "pick one thing that used to mean something and spend 15 minutes with it today. not to feel amazing — just to feel something." }
    ]
  },
  stress: {
    steps: [
      { title: "what's pressing on you?", body: "stress is pressure with nowhere to go. where's it coming from?", choices: ["work or school","money stuff","relationships","i'm just stretched too thin"] },
      { "work or school": { title: "the grind is grinding back", body: "too much, too fast, expectations stacking up. it gets heavy.", choices: ["i can't keep up","i don't feel like i'm good enough","i'm burnt out"] }, "money stuff": { title: "financial stress is real stress", body: "money worries sit in the background of everything. hard to chill when you're always calculating.", choices: ["i'm behind on things","i feel trapped","i'm scared about the future"] }, "relationships": { title: "people can be a lot", body: "stress from people you care about — or have to deal with — hits different than regular stress.", choices: ["there's conflict i can't resolve","i'm carrying someone else's weight","i feel under-appreciated"] }, "i'm just stretched too thin": { title: "capacity exceeded bro", body: "too many things pulling you in too many directions. no room left to just exist.", choices: ["i can't say no to things","my schedule is killing me","i can't remember the last time i actually rested"] } },
      { final: true, title: "stress located.", body: "stress means you care and you're pushing hard. but your body keeps score bro.", tip: "do one thing tonight just for yourself. no productivity attached. half hour. the rest can genuinely wait." }
    ]
  },
  numbness: {
    steps: [
      { title: "when did numb start?", body: "numbness is usually protection. something made it feel unsafe to feel too much.", choices: ["after something hard happened","it crept in slowly","i've always been a bit detached","when things got too overwhelming"] },
      { "after something hard happened": { title: "shutdown mode", body: "your system took on too much and the circuit breaker tripped. numbness is just the safety protocol.", choices: ["loss or grief","a really rough period","something i don't wanna get into"] }, "it crept in slowly": { title: "slow fade", body: "day by day, a little less feeling. until you realised you weren't really reacting to things anymore.", choices: ["i've been numb for months","i stopped caring about things i used to","i lost my spark gradually"] }, "i've always been a bit detached": { title: "default setting", body: "some people just run cooler emotionally. sometimes it's how they're wired. sometimes it was learned early.", choices: ["emotions were never safe to show growing up","i just process differently","i'm not sure it's even a problem"] }, "when things got too overwhelming": { title: "emotional overload", body: "too much at once and the system just turned the volume down. it's a coping move.", choices: ["too many things hitting at once","i just couldn't handle it all","i went quiet inside"] } },
      { final: true, title: "numbness understood.", body: "you're not broken bro. you're protected. the feeling's still in there — just behind a wall you built for a reason.", tip: "don't force it. just expose yourself to something that moves you — a song, a show, a memory. give the wall a small opening." }
    ]
  },
  shame: {
    steps: [
      { title: "what's the shame about?", body: "shame says 'i am bad', not just 'i did something bad'. that difference actually matters a lot.", choices: ["something i did","how i look or who i am","things i've been through","feeling like less than everyone else"] },
      { "something i did": { title: "guilt vs shame", body: "guilt says what you did was wrong. shame says YOU are wrong. those are really different things bro.", choices: ["i hurt someone","i failed at something","i made a choice i can't undo"] }, "how i look or who i am": { title: "self-image stuff", body: "shame about your body, your personality, your brain. somewhere along the way someone taught you that you weren't enough.", choices: ["i got criticised a lot growing up","i compare myself to everyone","i don't feel like i fit anywhere"] }, "things i've been through": { title: "survivor shame", body: "feeling ashamed of things that happened to you — things you didn't choose or control. bro, that's not yours to carry.", choices: ["something was done to me","my past feels like a burden","i'm scared of people knowing"] }, "feeling like less than everyone else": { title: "the not enough thing", body: "that constant baseline of feeling behind, lesser, not quite right. it's exhausting to live with.", choices: ["i never feel like i've done enough","i don't feel worthy of good things","i make myself small around others"] } },
      { final: true, title: "shame faced.", body: "shame only survives in silence. you just said it out loud. that's not nothing bro.", tip: "shame needs secrecy to survive. tell one person one real thing about yourself this week. doesn't have to be the big thing. just something honest." }
    ]
  }
};

let curFeeling = null, stepIdx = 0, path = [];

function buildBubbles() {
  const cave = document.getElementById('cave');
  const W = window.innerWidth;
  const H = window.innerHeight;
  const placed = [];

  feelings.forEach(f => {
    const s = f.size;
    let x = 0, y = 0, ok = false;
    for (let t = 0; t < 200; t++) {
      x = Math.random() * (W - s - 10) + 5;
      y = Math.random() * (H - s - 80) + 75;
      ok = placed.every(p => {
        const dx = x + s/2 - p.cx, dy = y + s/2 - p.cy;
        return Math.sqrt(dx*dx + dy*dy) > (s/2 + p.r + 12);
      });
      if (ok) break;
    }
    placed.push({ cx: x+s/2, cy: y+s/2, r: s/2 });

    const d = document.createElement('div');
    d.className = 'bubble';
    d.style.cssText = `width:${s}px;height:${s}px;left:${x}px;top:${y}px;animation-duration:${(3.5+Math.random()*4).toFixed(1)}s;animation-delay:-${(Math.random()*4).toFixed(1)}s`;
    d.innerHTML = `<span>${f.label}</span>`;
    d.onclick = () => begin(f.label);
    cave.appendChild(d);
  });
}

function begin(feeling) {
  curFeeling = feeling; stepIdx = 0; path = [];
  document.getElementById('cave').style.display = 'none';
  document.getElementById('final').classList.remove('on');
  showStep();
}

function showStep() {
  const steps = flows[curFeeling].steps;
  let node;
  if (stepIdx === 0) node = steps[0];
  else if (stepIdx === 1) node = steps[1][path[0]];
  else { showFinal(steps[2]); return; }

  document.getElementById('otag').textContent = curFeeling;
  document.getElementById('otitle').textContent = node.title;
  document.getElementById('obody').textContent = node.body;
  const ch = document.getElementById('choices');
  ch.innerHTML = '';
  node.choices.forEach(c => {
    const b = document.createElement('button');
    b.className = 'cbtn'; b.textContent = c;
    b.onclick = () => { path.push(c); stepIdx++; showStep(); };
    ch.appendChild(b);
  });

  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i <= stepIdx ? ' on' : '');
    dots.appendChild(d);
  }
  document.getElementById('overlay').classList.add('on');
}

function showFinal(node) {
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('ftitle').textContent = node.title;
  document.getElementById('fbody').textContent = node.body;
  document.getElementById('ftip').textContent = '→  ' + node.tip;
  document.getElementById('final').classList.add('on');
}

function goBack() {
  if (stepIdx === 0) { restart(); return; }
  path.pop(); stepIdx--;
  showStep();
}

function restart() {
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('final').classList.remove('on');
  document.getElementById('cave').style.display = 'block';
}

buildBubbles();
</script>
</body>
</html>
